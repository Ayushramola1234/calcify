<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Template | CalcifyAI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="calculator-template">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        Home / Calculators / Template
      </nav>

      <h1>Calculator Title Placeholder</h1>

      <section class="layout" aria-label="Calculator workspace">
        <article class="panel input-panel">
          <h2>Inputs</h2>
          <label for="example-input">Example Input</label>
          <input id="example-input" type="number" placeholder="Enter a number" />
        </article>

        <article class="panel results-panel">
          <h2>Results</h2>
          <p id="result-output">Result will appear here.</p>
          <div class="chart-placeholder" role="img" aria-label="Chart placeholder">
            Chart placeholder
          </div>
        </article>
      </section>

      <section class="seo-content" aria-label="SEO content">
        <h2>SEO Content Placeholder</h2>
        <p>Informational content for search engines and users.</p>
      </section>

      <section class="faq" aria-label="Frequently asked questions">
        <h2>FAQ Placeholder</h2>
        <p>Q&A content goes here.</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
